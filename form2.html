<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Food & Travel Recommendation</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f5f7fb;
display:flex;
justify-content:center;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:600px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:25px;
}

label{
font-weight:bold;
display:block;
margin-top:15px;
}

input, textarea, select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

textarea{
resize:vertical;
height:80px;
}

.radio-group{
margin-top:8px;
}

.radio-group input{
width:auto;
margin-right:5px;
}

.hidden{
display:none;
}

button{
width:100%;
background:#4a6cf7;
color:white;
border:none;
padding:12px;
border-radius:6px;
font-size:16px;
margin-top:20px;
cursor:pointer;
}

button:hover{
background:#3451d1;
}

</style>

<script>

function statusChange(){

let status=document.querySelector('input[name="status"]:checked').value;

document.getElementById("major").classList.add("hidden");
document.getElementById("profession").classList.add("hidden");
document.getElementById("retired").classList.add("hidden");

if(status==="student"){
document.getElementById("major").classList.remove("hidden");
}

if(status==="working"){
document.getElementById("profession").classList.remove("hidden");
}

if(status==="retired"){
document.getElementById("retired").classList.remove("hidden");
}

}

function toggleEmail(show){
document.getElementById("emailField").style.display=show?"block":"none";
}

function toggleInsta(show){
document.getElementById("instaField").style.display=show?"block":"none";
}

</script>

</head>

<body>

<div class="container">

<h2>Food & Travel Recommendation Form</h2>

<form action="https://script.google.com/macros/s/AKfycbzquMCi9UiyMqbPv9TpSXkV3nr89jw6492PhEGiV0Epj1nI-TeXxgRhael3iMD25v0B/exec" method="POST">

<label>Name</label>
<input type="text" name="name" placeholder="Your name">

<label>Country</label>
<input type="text" name="country" placeholder="Your country">

<label>City / Place</label>
<input type="text" name="city" placeholder="Your city">

<label>Favorite Food</label>
<input type="text" name="food" placeholder="Your favorite food">

<label>Hidden place tourists usually don’t visit</label>
<textarea name="hidden_place" placeholder="A place tourists usually don't visit"></textarea>

<label>Food you recommend me to try</label>
<textarea name="recommend_food"></textarea>

<label>Recommendation for me</label>
<textarea name="recommendation"></textarea>

<label>Preferred Destination</label>
<div>
<input type="radio" name="destination" value="Mountain"> Mountain
<input type="radio" name="destination" value="Beach"> Beach
<input type="radio" name="destination" value="Both"> Both
<input type="radio" name="destination" value="Neither"> Neither
</div>

<label>Current Status</label>
<div>
<input type="radio" name="status" value="school_student"> School Student
<input type="radio" name="status" value="university_student"> University Student
<input type="radio" name="status" value="working"> Working
<input type="radio" name="status" value="retired"> Retired
</div>

<label>Major (if student)</label>
<select name="major">
<option value="">Select major</option>
<option value="Science">Science</option>
<option value="Commerce">Commerce / Business</option>
<option value="Arts">Arts / Humanities</option>
<option value="Engineering">Engineering</option>
<option value="Medical">Medical</option>
<option value="Other">Other</option>
</select>

<label>Profession (if working)</label>
<select name="profession">
<option value="">Select profession</option>
<option value="Teacher">Teacher</option>
<option value="Engineer">Engineer</option>
<option value="Businessman">Businessman</option>
<option value="Government Job">Government Job</option>
<option value="Private Job">Private Job</option>
<option value="Other">Other</option>
</select>

<label>If retired, previous profession or current activity</label>
<textarea name="retired_info"></textarea>

<label>Email Address</label>
<div>
<input type="radio" name="email_status" value="Provided"> Provided
<input type="radio" name="email_status" value="Not Provided"> Not Provided
</div>
<input type="email" name="email" placeholder="Enter email (if provided)">

<label>Instagram ID</label>
<div>
<input type="radio" name="instagram_status" value="Provided"> Provided
<input type="radio" name="instagram_status" value="Not Provided"> Not Provided
</div>
<input type="text" name="instagram" placeholder="Enter Instagram ID (if provided)">

<button type="submit">Submit</button>

</form>

</div>

</body>
</html>
